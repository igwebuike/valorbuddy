services:
  - type: web
    name: valorbuddy
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: CORS_ORIGINS
        value: '*'
      - key: ENVIRONMENT
        value: production
  - type: static
    name: valorbuddy-frontend
    rootDir: frontend
    buildCommand: npm install --include=dev && chmod +x node_modules/@esbuild/linux-x64/bin/esbuild || true && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://valorbuddy.onrender.com
