services:
  - type: web
    name: valorbuddy-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: valorbuddy-db
          property: connectionString
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: CORS_ORIGINS
        value: '*'
  - type: static
    name: valorbuddy
    rootDir: frontend
    buildCommand: npm install --include=dev && chmod +x ./node_modules/@esbuild/linux-x64/bin/esbuild || true && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: valorbuddy-api
          property: host

databases:
  - name: valorbuddy-db
    databaseName: valorbuddy
    user: valorbuddy
    plan: free
